name: 'Build'
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Checkout
      run: whoami
     
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'oracle'
        cache: gradle
        
    - name: Build with Gradle
      env:
        ORG_GRADLE_JVMARGS: -Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
      run: |
        .\gradlew.bat :composeApp:createReleaseDistributable
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: "Binary"
        path: "composeApp/build/compose/binaries/main-release/app/dev.faizul726.mcscreenshotviewer/*"
        compression-level: 5
